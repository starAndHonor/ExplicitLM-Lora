# Explicit-LoRA 全量非敏感配置
# 注意：所有字段必须写全，dataclass 无默认值，缺字段将在 load_config() 时立即报错
# 敏感信息（API Key、绝对路径）请写入 .env 文件，不要修改此文件

model:
  # 基础模型标识（HuggingFace 路径或本地目录名，绝对路径请用 .env MODEL_PATH）
  base_model: "Qwen/Qwen3-0.6B"
  # Transformer 隐藏维度（Qwen3-0.6B: 1024，4B: 2560，7B: 3584）
  hidden_dim: 1024
  # Transformer 层数（Qwen3-0.6B: 28）
  num_layers: 28
  # 知识注入方式: "attention" | "concat" | "gated"
  injection_method: "attention"
  # 注入模块所在层索引（从 0 起，每 6 层一个注入点）
  injection_layers: [6, 12, 18, 24]
  # 检索侧编码器使用 Qwen3 前 N 层（0 = 纯词嵌入 mean pool，不经过 Transformer）
  retrieval_encoder_depth: 0
  # 融合/注入侧编码器使用 Qwen3 前 N 层（Phase2/Phase3）
  fusion_encoder_depth: 6
  # 知识编码器模式: "trainable" | "qwen3"
  # trainable = 显式 mask + 独立 norm + 可联合训练
  # qwen3 = 当前默认模式，直接复用 Qwen3 前 N 层与原始 norm，不显式使用知识 mask，不训练 encoder
  knowledge_encoder_mode: "qwen3"
  # Fusion Bank 每条知识的 token 数（LLMLingua 压缩后）
  fusion_length: 64
  # Anchor Bank 每条知识的 token 数（原文截断，用于路由匹配）
  anchor_length: 128

router:
  # 知识库总条目数（1024 * 1024 = 1,048,576 ≈ 1M）
  knowledge_num: 1048576
  # 路由器内部隐藏维度
  dim: 1024
  # 查询向量维度（来自 FeatureAdapter 输出）
  query_dim: 1024
  # Product Key Memory 行/列 key 子空间维度（= dim // 2）
  key_proj_dim: 512
  # FeatureAdapter 中间维度
  adapter_dim: 512
  # 粗排候选条目数（从 PKM Top-N 候选中进行精排）
  num_candidates: 256
  # PKM softmax 温度参数（越低越尖锐）
  temperature: 0.1
  # 触发重新聚类的变更比例阈值（变更条目数 / 总条目数 > 此值则重聚类）
  recluster_threshold: 0.1
  # 粗排每个 grid cell 最多取多少候选（-1=全量倒排索引，1=简单1:1映射）
  max_candidates_per_cell: -1
  # RefinedSelector Transformer 注意力头数（adapter_dim=512 必须能被此值整除）
  refined_num_heads: 8
  # RefinedSelector Transformer 层数（2 层轻量设计，参数量约 2M）
  refined_num_layers: 2

train:
  # Phase 1: Router 训练（PKM + FeatureAdapter + RefinedSelector）
  phase1_lr: 5.0e-4
  phase1_batch_size: 72
  phase1_max_epochs: 20
  phase1_warmup_steps: 2000

  # Phase 2: Fusion 预训练（AttentionInjection × 4 + KnowledgeEncoder，FineWeb-Edu）
  phase2_lr: 3.0e-4
  phase2_batch_size: 32
  phase2_max_epochs: 10
  phase2_warmup_steps: 100

  # Phase 3: 下游 SFT（MedQA，早停）
  phase3_lr: 1.0e-4
  phase3_batch_size: 16
  phase3_max_epochs: 10
  phase3_warmup_steps: 50

  # 早停耐心轮次（Phase 3 val_loss 连续 patience 轮不下降则停止）
  patience: 3
  # 梯度裁剪最大范数
  grad_clip: 1.0
  # 是否使用 bfloat16 混合精度
  bf16: true
  # Phase 1 梯度累积步数（等效 batch_size = phase1_batch_size × phase1_gradient_accumulation_steps）
  phase1_gradient_accumulation_steps: 8
  # Phase 2 梯度累积步数（等效 batch_size = phase2_batch_size × phase2_gradient_accumulation_steps）
  phase2_gradient_accumulation_steps: 4
  # Phase 3 梯度累积步数
  phase3_gradient_accumulation_steps: 1
  # Phase 1 重聚类时 compact_and_recluster 内部 encoder 编码批大小
  phase1_recluster_batch_size: 10240

data:
  # 压缩后知识 token 数（需与 model.fusion_length 保持一致）
  fusion_length: 64
  # 原文截断 token 数（需与 model.anchor_length 保持一致）
  anchor_length: 128
  # DataLoader 并行 worker 数
  num_workers: 4
  # 训练样本上限，-1 表示使用全量数据
  train_max_samples: -1
  # Phase 1 Router 训练数据（预压缩 FineWeb-Edu Parquet 目录）
  phase1_parquet_dir: "data/compressed/v2"
  # Phase 1 tokenize 批大小（tokenize text/compressed_text 时的批大小）
  phase1_tokenize_batch_size: 10000
  # Phase 1 重聚类时 encoder 编码的分块大小（避免 OOM）
  phase1_recluster_chunk_size: 512
  # Phase 2 每 epoch 从 FineWeb-Edu Parquet 采样的样本数（-1=全量，通常设 128K）
  phase2_n_samples_per_epoch: 131072
  # Phase 3 SFT 序列最大长度（question+options+answer 拼接后的 token 上限）
  phase3_max_seq_length: 256

paths:
  # 基础模型权重目录（可被 .env 中的 MODEL_PATH 覆盖为绝对路径）
  model_dir: "Qwen3-0.6B"
  # LLMLingua 压缩模型目录（可被 .env 中的 LLMLINGUA_PATH 覆盖）
  llmlingua_model_dir: "llmlingua-2-xlm-roberta-large"
  # 数据根目录
  data_dir: "data"
  # 训练检查点保存目录
  checkpoint_dir: "checkpoints"
  # 日志输出目录
  log_dir: "logs"
  # 评测结果保存目录
  results_dir: "results"

swanlab:
  # SwanLab 项目名称
  project: "explicit-lora-phase1"
  # 是否启用 SwanLab 追踪
  enabled: true
  # 每隔多少训练步上报一次指标
  log_every_n_steps: 50
  # Phase 1 每隔多少步打印 acc/row_acc/col_acc 并上报 SwanLab
  phase1_log_acc_steps: 1000
  # Phase 1 step 级别 row/col recall 使用的 top-K（对齐参考项目 refine_top_k=8）
  phase1_log_recall_k: 8

eval:
  # MedQA 知识映射文件（question → compressed_knowledge）
  medqa_knowledge_map: "data/medqa_knowledge.jsonl"
  # ARC-Challenge 知识映射文件
  arc_knowledge_map: "data/arc_knowledge.jsonl"
  # MMLU 知识映射文件
  mmlu_knowledge_map: "data/mmlu_knowledge.jsonl"
  # lm-eval 框架任务名列表
  lm_eval_tasks:
    - "medqa_4options"
  # few-shot 示例数量（0 = zero-shot）
  num_fewshot: 0
